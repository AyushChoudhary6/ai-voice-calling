# Render Blueprints
services:
  # Backend service
  - type: web
    name: white-collar-ai-backend
    env: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HF_TOKEN
        sync: false
      - key: HF_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: PORT
        value: 10000

  # Frontend service
  - type: web
    name: white-collar-ai-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: white-collar-ai-backend
          envVarKey: RENDER_EXTERNAL_URL
